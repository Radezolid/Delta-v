changes:
- message: "The December, and half of January, is now here! Check the Upstream changelog for more information. Some highlights:"
  type: Add
- message: Ephedrine, Desoxyephedrine and Hyperzine have been rebalanced
  type: Tweak
- message: New chemicals Warfarin and Hemorrhinol were added that cause bleeding
  type: Add
- message: Vestine-based chems don't randomly show up in botany anymore
  type: Tweak
- message: Service, Medical, and Janitor borgs no longer start with tools
  type: Tweak
- message: borg maintenance panel uses screwdrivers now, borg access can be pried out when they're crit
  type: Tweak
- message: The Cryo Pod gets its own fancy UI
  type: Tweak
- message: Camera monitors now have a map showing the locations of cameras
  type: Add
- message: The TEG now generates 75% more power.
  type: Tweak
- message: And more!
  type: Add
